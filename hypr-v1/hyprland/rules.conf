# ######## Window rules ########
windowrule = opacity $windowOpacity override, match:fullscreen false

windowrule = opaque true, match:class foot|equibop|org\.quickshell|imv|swappy  # They use native transparency or we want them opaque
windowrule = center true, match:float true, match:xwayland false  # Center all floating windows (not xwayland cause popups)

# Float
windowrule = float true, match:class guifetch  # FlafyDev/guifetch
windowrule = float true, match:class yad
windowrule = float true, match:class zenity
windowrule = float true, match:class wev
windowrule = float true, match:class org\.gnome\.FileRoller
windowrule = float true, match:class file-roller  # WHY IS THERE TWOOOOOOOOOOOOOOOO
windowrule = float true, match:class blueman-manager
windowrule = float true, match:class com\.github\.GradienceTeam\.Gradience
windowrule = float true, match:class feh
windowrule = float true, match:class imv
windowrule = float true, match:class system-config-printer
windowrule = float true, match:class org\.quickshell

# Float, resize and center
windowrule = float true, match:class foot, match:title nmtui
windowrule = size 60% 70%, match:class foot, match:title nmtui
windowrule = center 1, match:class foot, match:title nmtui
windowrule = float true, match:class org\.gnome\.Settings
windowrule = size 70% 80%, match:class org\.gnome\.Settings
windowrule = center 1, match:class org\.gnome\.Settings
windowrule = float true, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = size 60% 70%, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = center 1, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = float true, match:class nwg-look
windowrule = size 50% 60%, match:class nwg-look
windowrule = center 1, match:class nwg-look

# Special workspaces
windowrule = workspace special:sysmon, match:class btop
windowrule = workspace special:music, match:class feishin|Spotify|Supersonic|Cider
windowrule = workspace special:music, match:initial_title Spotify( Free)?  # Spotify wayland, it has no class for some reason
windowrule = workspace special:communication, match:class discord|equibop|vesktop|whatsapp
windowrule = workspace special:todo, match:class Todoist

# Dialogs
windowrule = float true, match:title (Select|Open)( a)? (File|Folder)(s)?
windowrule = float true, match:title File (Operation|Upload)( Progress)?
windowrule = float true, match:title .* Properties
windowrule = float true, match:title Export Image as PNG
windowrule = float true, match:title GIMP Crash Debug
windowrule = float true, match:title Save As
windowrule = float true, match:title Library

# Picture in picture (resize and move done via script)
windowrule = move 100%-w-2% 100%-w-3%, match:title Picture(-| )in(-| )[Pp]icture  # Initial move so window doesn't shoot across the screen from the center
windowrule = keep_aspect_ratio true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = float true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = pin true, match:title Picture(-| )in(-| )[Pp]icture

# Steam
windowrule = rounding 10, match:class steam
windowrule = float true, match:title Friends List, match:class steam
windowrule = immediate true, match:class steam_app_[0-9]+  # Allow tearing for steam games
windowrule = idle_inhibit always, match:class steam_app_[0-9]+  # Always idle inhibit when playing a steam game

# ATLauncher console
windowrule = float true, match:class com-atlauncher-App, match:title ATLauncher Console

# Autodesk Fusion 360
windowrule = no_blur true, match:title Fusion360|(Marking Menu), match:class fusion360\.exe

# Ugh xwayland popups
windowrule = no_dim true, match:xwayland 1, match:title win[0-9]+
windowrule = no_shadow true, match:xwayland 1, match:title win[0-9]+
windowrule = rounding 10, match:xwayland 1, match:title win[0-9]+

# ######## Workspace rules ########
workspace = w[tv1]s[false], gapsout:$singleWindowGapsOut
workspace = f[1]s[false], gapsout:$singleWindowGapsOut

# ######## Layer rules ########
layerrule = animation fade, match:namespace hyprpicker  # Colour picker out animation
layerrule = animation fade, match:namespace logout_dialog  # wlogout
layerrule = animation fade, match:namespace selection  # slurp
layerrule = animation fade, match:namespace wayfreeze

# Fuzzel
layerrule = animation popin 80%, match:namespace launcher
layerrule = blur true, match:namespace launcher

# Shell
layerrule = no_anim true, match:namespace caelestia-(border-exclusion|area-picker)
layerrule = animation fade, match:namespace caelestia-(drawers|background)

layerrule = blur true, match:namespace caelestia-drawers
layerrule = ignore_alpha 0.57, match:namespace caelestia-drawers

# CUSTOM ===========================

# Opacity Variables
$OPACITY_ACTIVE = 0.93
$OPACITY_INACTIVE = 0.84
$OPACITY_NAV_HOM = 0.5

# =========================================================
# REGRAS DE TRANSPARÊNCIA
# =========================================================

# Kitty
windowrule = opacity 1 override $OPACITY_INACTIVE override, match:class kitty

# Dolphin
windowrule = opacity $OPACITY_ACTIVE override $OPACITY_INACTIVE override, match:class org\.kde\.dolphin|dolphin

windowrule = float true, match:title .*Rename.*
windowrule = float false, match:title .*sxiv.* #image viewer

# Kate
windowrule = opacity $OPACITY_ACTIVE override $OPACITY_INACTIVE override, match:class org\.kde\.kate|kate

# Code / Codium
windowrule = opacity $OPACITY_ACTIVE override $OPACITY_INACTIVE override, match:title .*Code.*

windowrule = opacity 0.8 override 0.8 override, match:title .*TelegramDesktop.*

# Inkscape
windowrule = opacity 1 override 1 override, match:title .*Inkscape.*

# =========================================================
# Special Workspace
# =========================================================

# Bitwarden
windowrule = monitor 1, match:class Bitwarden
windowrule = workspace special:special, match:class Bitwarden
windowrule = float true, match:class Bitwarden
windowrule = move 56 11, match:class Bitwarden
windowrule = size 1081 686, match:class Bitwarden
windowrule = opacity $OPACITY_ACTIVE override $OPACITY_INACTIVE override, match:class Bitwarden

# VeraCrypt
windowrule = monitor 1, match:class veracrypt
windowrule = workspace special:special, match:class veracrypt
windowrule = float true, match:class veracrypt
windowrule = move 1145 403, match:class veracrypt
windowrule = opacity $OPACITY_ACTIVE override $OPACITY_INACTIVE override, match:class veracrypt

# ProtonVPN
windowrule = workspace special:music, match:class protonvpn-app
windowrule = float true, match:class protonvpn-app
windowrule = move 56 11, match:class protonvpn-app
windowrule = size 400 1058, match:class protonvpn-app
windowrule = opacity $OPACITY_ACTIVE override $OPACITY_INACTIVE override, match:class protonvpn-app

# VLC
windowrule = workspace special:music, match:title VLC media player
windowrule = float true, match:title VLC media player
windowrule = move 1112 405, match:title VLC media player
windowrule = size 252 315, match:title VLC media player

# =========================================================
# MIDIA & UTILITÁRIOS
# =========================================================

# Volume Mixer (Pavucontrol)
windowrule = float true, match:class pavucontrol-qt
windowrule = size 590 590, match:class pavucontrol-qt

# # BTOP
# windowrule = float true, match:class btop-float
# windowrule = size 885 700, match:class btop-float
# windowrule = center 1, match:class btop-float

# Anki
windowrule = opacity $OPACITY_ACTIVE override $OPACITY_INACTIVE override, match:title User 1 - Anki

# supress focus
windowrule = no_initial_focus on, match:class org.telegram.desktop
windowrule = suppress_event activatefocus, match:class org.telegram.desktop
windowrule = suppress_event activate, match:class org.telegram.desktop
windowrule = no_initial_focus on, match:title Telegram
windowrule = suppress_event activatefocus, match:title Telegram
windowrule = suppress_event activate, match:title Telegram
windowrule = no_initial_focus on, match:class Bitwarden
windowrule = suppress_event activatefocus, match:class Bitwarden
windowrule = suppress_event activate, match:class Bitwarden
windowrule = no_initial_focus on, match:title Bitwarden
windowrule = suppress_event activatefocus, match:title Bitwarden
windowrule = suppress_event activate, match:title Bitwarden

# =========================================================
# BROWSERS
# =========================================================

# Regra Geral
windowrule = opacity $OPACITY_ACTIVE override $OPACITY_INACTIVE override, match:class waterfox|librewolf|firefox

# Home / Nova Aba (Mais transparente)
windowrule = opacity $OPACITY_NAV_HOM override $OPACITY_NAV_HOM override, match:title Waterfox|LibreWolf|Firefox

# Videos / Leitura (Opaco)
windowrule = opacity 1.0 override 1.0 override, match:title .*YouTube.*
windowrule = opacity $OPACITY_ACTIVE override $OPACITY_ACTIVE override, match:title .*WhatsApp.*|.*pdf.*|.*rtk.*
windowrule = opacity $OPACITY_INACTIVE override 0.65 override, match:title .*FOCUS.*


# Regras para o script de foco
exec-once = python ~/.config/autostart/focus.py &
windowrule = float true, match:class .*focus_popup.*
# windowrule = pin, match:class .*focus_popup.*
windowrule = no_initial_focus on, match:class .*focus_popup.*
windowrule = suppress_event activate, match:class .*focus_popup.*
windowrule = suppress_event activatefocus, match:class .*focus_popup.*
