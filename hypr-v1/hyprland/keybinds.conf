 # ==============================================================================
# VARIÁVEIS E SCRIPTS (Mantidos do 'Atuais' para compatibilidade)
# ==============================================================================
$wsaction = ~/.config/hypr/scripts/wsaction.fish

# Inicia no modo global
exec = hyprctl dispatch submap global
submap = global

# ==============================================================================
# CAELESTIA CORE (Mantido do 'Atuais' - Não mexa)
# ==============================================================================

# Launcher
bindi = Super, Super_L, global, caelestia:launcher
bindin = Super, catchall, global, caelestia:launcherInterrupt
bindin = Super, mouse:272, global, caelestia:launcherInterrupt
bindin = Super, mouse:273, global, caelestia:launcherInterrupt
bindin = Super, mouse:274, global, caelestia:launcherInterrupt
bindin = Super, mouse:275, global, caelestia:launcherInterrupt
bindin = Super, mouse:276, global, caelestia:launcherInterrupt
bindin = Super, mouse:277, global, caelestia:launcherInterrupt
bindin = Super, mouse_up, global, caelestia:launcherInterrupt
bindin = Super, mouse_down, global, caelestia:launcherInterrupt

# Session & Lock
bind = Ctrl+Alt, Delete, global, caelestia:session
bind = Super, L, global, caelestia:lock
bindl = Super+Alt, L, exec, caelestia shell -d
bindl = Super+Alt, L, global, caelestia:lock

# Brightness
bindl = , XF86MonBrightnessUp, global, caelestia:brightnessUp
bindl = , XF86MonBrightnessDown, global, caelestia:brightnessDown

# Media Keys (Integração Caelestia)
bindl = , XF86AudioPlay, global, caelestia:mediaToggle
bindl = , XF86AudioPause, global, caelestia:mediaToggle
bindl = , XF86AudioNext, global, caelestia:mediaNext
bindl = , XF86AudioPrev, global, caelestia:mediaPrev
bindl = , XF86AudioStop, global, caelestia:mediaStop

# Volume
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86AudioRaiseVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# ==============================================================================
# SUBMAPS (Estrutura do 'Que Quero')
# ==============================================================================

# -----------------------------------------------------------------------
# [Q] Shell Submap
# -----------------------------------------------------------------------
bind = Super, Q, submap, shell
submap = shell

bindd = , Q, Toggle right sidebar, global, quickshell:sidebarRightToggle
bindd = , W, Toggle bar, global, quickshell:barToggle
bind  = , D, global, quickshell:overlayToggle

# Voltar ao global
bind = , Space, submap, global
bind = , Super, submap, global
bind = , Escape, submap, global
submap = global

# -----------------------------------------------------------------------
# [A] Text/Apps Submap
# -----------------------------------------------------------------------
bind = Super, A, submap, text
submap = text

bind = , E, exec, app2unit -- $fileExplorer   # File Manager
bind = , D, exec, app2unit -- $editor    # Text Editor Simples
# Code Editor (Tenta abrir o Code, se não tiver vai pro Kate)
bind = , C, exec, code
bind = , X, exec, libreoffice

# Voltar ao global
bind = , Space, submap, global
bind = , Super, submap, global
bind = , Escape, submap, global
submap = global

# -----------------------------------------------------------------------
# [W] Special Submap (Screenshot/Recorder)
# -----------------------------------------------------------------------
# Variável apontando para o script que criamos
$closeSpecial = exec, ~/.config/autostart/close_special.sh

bind = Super, W, submap, especial
submap = especial

# --- Ações do Menu ---
bind = , 1, exec, ~/.config/autostart/toggle-special.sh
bind = Alt, 1, movetoworkspacesilent, special

bind = , 2, exec, caelestia toggle music
bind = , 3, exec, caelestia toggle communication
bind = , 4, exec, caelestia toggle todo

bindi = Alt,Z, global, caelestia:launcher

bind = Super, F, togglefloating,

# Mouse
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow
bind = Super, C, killactive

# Space: Roda o script (fecha a special) E sai do submap
bind = , W, $closeSpecial
bind = , W, submap, global

# Escape
bind = , Escape, $closeSpecial
bind = , Escape, submap, global


# Voltar ao normal
submap = global

# -----------------------------------------------------------------------
# [S] Browser Submap
# -----------------------------------------------------------------------
bind = Super, S, submap, browser
submap = browser

bind = , 1, exec, app2unit -- $browser1      # Browser 1
bind = , 2, exec, app2unit -- $browser2     # Browser 2

# Voltar ao global
bind = , Space, submap, global
bind = , Super, submap, global
bind = , Escape, submap, global
submap = global

# -----------------------------------------------------------------------
# [X] Worksets Submap (Workspaces pré-definidos)
# -----------------------------------------------------------------------
bind = Super, X, submap, worksets
submap = worksets

bind = , 1, exec, ~/.config/autostart/workset-0-clean.sh
bind = , 2, exec, ~/.config/autostart/workset-1-for-study.sh
bind = , 3, exec, ~/.config/autostart/workset-4-for-tasks.sh
bind = , 4, exec, ~/.config/autostart/workset-2-for-config.sh
bind = , 5, exec, ~/.config/autostart/workset-3-for-drawing.sh

# Voltar ao global
bind = , Space, submap, global
bind = , Super, submap, global
bind = , Escape, submap, global
submap = global

# -----------------------------------------------------------------------
# [E] Media Submap
# -----------------------------------------------------------------------
bind = Super, E, submap, media
submap = media

bindl = , D, global, caelestia:mediaToggle
bindl = , Q, global, caelestia:mediaPrev
bindl = , W, global, caelestia:mediaNext
bind  = , F, exec, pavucontrol

# Voltar ao global
bind = , Space, submap, global
bind = , Super, submap, global
bind = , Escape, submap, global
submap = global

# -----------------------------------------------------------------------
# [D] Tiling Submap
# -----------------------------------------------------------------------
bind = Super, D, submap, tiling
submap = tiling

binde = , Q, splitratio, -0.2
binde = , W, splitratio, +0.2

bind = , S, fullscreen, 0
bind = , D, fullscreen, 1
bind = , F, togglefloating,

# Voltar ao globalS
bind = , Space, submap, global
bind = , Super, submap, global
bind = , Escape, submap, global
submap = global

# -----------------------------------------------------------------------
# [F] Utilities Submap (Screenshot/Recorder)
# -----------------------------------------------------------------------
bind = Super, F, submap, utilities
submap = utilities

# Clipboard
bindd = , V, Clipboard history, global, quickshell:overviewClipboardToggle

# Screenshots (Usando integração Caelestia)
bind =  , D, global, caelestia:screenshotFreeze  # Screen snip
bind = Shift, D, exec, caelestia screenshot
bindl = , S, global, caelestia:screenshot      # Fullscreen

# Record
bindl = , W, exec, caelestia record -r          # Record Region
bindl = , Q, exec, caelestia record             # Record Screen

# Color Picker
bindd = , R, Color picker, exec, hyprpicker -a
bindl =  , X, exec, pkill -SIGUSR1; wayscriber -a

# Voltar ao global
bind = , Space, submap, global
bind = , Super, submap, global
bind = , Escape, submap, global
submap = global

# ==============================================================================
# ATALHOS GERAIS (Fora de Submaps)
# ==============================================================================

# Terminal (Direto)
bind = Super, Return, exec, $terminal

# Fechar Janela
bind = Super, C, killactive

# Wallpaper
# bindd = Super, R, Toggle wallpaper, global, quickshell:wallpaperSelectorToggle
# bindd = Super+Shift, R, Random wallpaper, global, quickshell:wallpaperSelectorRandom

# Clipboard / Emoji (Fallback)
bind = Super, V, exec, pkill fuzzel || caelestia clipboard
bind = Super, Period, exec, pkill fuzzel || caelestia emoji -p

# Toggle Special Workspace (Widgets Caelestia)
bind = Ctrl+Shift, Escape, exec, caelestia toggle sysmon


# ==============================================================================
# WORKSPACES (Usando Keycodes do 'Que Quero' + Scripts do 'Atuais')
# ==============================================================================

# Mudar de Workspace (Super + [1-0])
bind = Super, code:10, exec, $wsaction workspace 1
bind = Super, code:11, exec, $wsaction workspace 2
bind = Super, code:12, exec, $wsaction workspace 3
bind = Super, code:13, exec, $wsaction workspace 4
bind = Super, code:14, exec, $wsaction workspace 5
bind = Super, code:15, exec, $wsaction workspace 6
bind = Super, code:16, exec, $wsaction workspace 7
bind = Super, code:17, exec, $wsaction workspace 8
bind = Super, code:18, exec, $wsaction workspace 9
bind = Super, code:19, exec, $wsaction workspace 10

# Mover Janela para Workspace (Super + Alt + [1-0])
bind = Super+Alt, code:10, exec, $wsaction movetoworkspacesilent 1
bind = Super+Alt, code:11, exec, $wsaction movetoworkspacesilent 2
bind = Super+Alt, code:12, exec, $wsaction movetoworkspacesilent 3
bind = Super+Alt, code:13, exec, $wsaction movetoworkspacesilent 4
bind = Super+Alt, code:14, exec, $wsaction movetoworkspacesilent 5
bind = Super+Alt, code:15, exec, $wsaction movetoworkspacesilent 6
bind = Super+Alt, code:16, exec, $wsaction movetoworkspacesilent 7
bind = Super+Alt, code:17, exec, $wsaction movetoworkspacesilent 8
bind = Super+Alt, code:18, exec, $wsaction movetoworkspacesilent 9
bind = Super+Alt, code:19, exec, $wsaction movetoworkspacesilent 10

# Navegação Relativa
bind = Ctrl+Super, Right, workspace, r+1
bind = Ctrl+Super, Left, workspace, r-1
bind = Super, mouse_up, workspace, +1
bind = Super, mouse_down, workspace, -1



# ==============================================================================
# MOVIMENTO E FOCO DE JANELAS
# ==============================================================================

# Mover Foco (Setas)
bind = Super, Left, movefocus, l
bind = Super, Right, movefocus, r
bind = Super, Up, movefocus, u
bind = Super, Down, movefocus, d

# Mover Janela (Shift + Setas)
bind = Super+Shift, Left, movewindow, l
bind = Super+Shift, Right, movewindow, r
bind = Super+Shift, Up, movewindow, u
bind = Super+Shift, Down, movewindow, d

# Mouse
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow


bind = Super,F12, exec, ~/.config/hypr/toggle_steno.sh
